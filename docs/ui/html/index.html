<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UG-GroupBuy 商城</title>
  <link rel="stylesheet" href="css/index.css?v=20260410team6">
</head>
<body>
<div class="page">
  <header class="topbar">
    <div>
      <h1>UG-GroupBuy 商城</h1>
      <p>数码好物精选，支持单买与拼团</p>
    </div>
    <a class="ops-link" href="admin.html">后台管理</a>
  </header>

  <main class="mall-layout">
    <section class="card catalog-panel">
      <div class="section-head section-head-wrap">
        <div>
          <h2>商品列表</h2>
          <span id="productCount">共 0 件</span>
        </div>
        <div class="catalog-tools">
          <label class="visually-hidden" for="productSearchInput">搜索商品</label>
          <input id="productSearchInput" class="search-input" type="text" placeholder="搜索商品名称，例如 iPhone / MateBook">
        </div>
      </div>

      <div id="categoryFilter" class="category-filter"></div>
      <div id="productList" class="product-list"></div>
    </section>

    <section class="trade-layout">
      <section class="card detail-panel">
        <div class="section-head">
          <h2>商品详情</h2>
          <span>当前选中商品</span>
        </div>
        <div class="product-meta">
          <h3 id="productTitle">-</h3>
          <p id="productSubtitle" class="product-subtitle">-</p>

          <div class="promo-row">
            <span class="promo-tag">优惠信息</span>
            <span id="promotionText" class="promo-text">加载中...</span>
          </div>

          <div class="price-row">
            <span id="originPrice" class="origin-price">￥0</span>
            <span id="groupPrice" class="group-price">￥0</span>
          </div>
          <div class="price-extra">
            <span id="saveAmount" class="save-amount">立省 ￥0</span>
            <span id="couponTag" class="coupon-tag">券后价</span>
          </div>
          <div class="product-actions">
            <button id="buyAloneBtn" class="action-btn light">单独购买(￥0)</button>
            <button id="groupBuyBtn" class="action-btn primary">开团购买(￥0)</button>
          </div>
        </div>
      </section>

      <section class="card team-panel">
        <div class="section-head">
          <h2>可参与团队</h2>
          <span>点击快速参团</span>
        </div>
        <div class="group-table-head">
          <span>团队</span>
          <span>还差人数</span>
          <span>倒计时</span>
          <span>操作</span>
        </div>
        <div id="groupListContainer" class="group-list"></div>
      </section>
    </section>
  </main>

  <div id="paymentModal" class="modal">
    <div class="modal-card">
      <h3>请扫码支付</h3>
      <p id="paymentProductName" class="payment-product-name"></p>
      <p id="paymentAmount" class="payment-amount"></p>
      <div class="qr-code-placeholder">模拟支付环境（无二维码图片）</div>
      <p id="outTradeNo" class="trade-no"></p>
      <div class="modal-actions">
        <button id="cancelPayment" class="modal-btn light">取消支付</button>
        <button id="completePayment" class="modal-btn primary">支付完成</button>
      </div>
    </div>
  </div>

</div>

<script src="js/index.js?v=20260509origin1"></script>
</body>
</html>
